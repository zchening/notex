<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="便签">
<link rel="manifest" href="/manifest.json">
<title>便签 · note.xuyinji.com.cn</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{ --bg:#fafafa; --fg:#1a1a1a; --muted:#888; --line:#e6e6e6; --accent:#2b6cff; --box-bg:#fff; --upload-bg:#1a1a1a; }
  body.dark{ --bg:#1a1a2e; --fg:#e0e0e0; --muted:#888; --line:#333344; --accent:#5b8def; --box-bg:#252540; --upload-bg:#e0e0e0; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--fg);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;flex-direction:column;transition:background .3s,color .3s}
  header{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line);font-size:14px;color:var(--muted)}
  header .dot{width:8px;height:8px;border-radius:50%;background:#bbb;flex-shrink:0}
  header .dot.on{background:#2ecc71}
  header .sp{flex:1}
  header button{font-size:16px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:6px;padding:4px 8px;cursor:pointer;line-height:1.2}
  header button:hover{color:var(--fg)}
  #editor{flex:1;width:100%;border:0;outline:0;resize:none;padding:16px;background:transparent;color:var(--fg);font:inherit;overflow-y:auto;word-wrap:break-word;white-space:pre-wrap;-webkit-user-select:text;user-select:text;contenteditable:true;line-height:1.8}
  #editor:empty:before{content:attr(data-ph);color:var(--muted);pointer-events:none}
  #editor.dragover{background:#e7f0ff;outline:2px dashed var(--accent);outline-offset:-4px}
  #editor img{max-width:100%;border-radius:8px;margin:4px 0;display:block}
  #editor a{color:var(--accent);text-decoration:none}
  #editor a:hover{text-decoration:underline}
  #editor p{margin:0}
  footer{padding:6px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-align:right}
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:10}
  .mask.hidden{display:none!important}
  .box{background:var(--box-bg);border-radius:12px;padding:22px;width:min(92vw,360px);box-shadow:0 8px 30px rgba(0,0,0,.15);transition:background .3s}
  .box h1{font-size:17px;margin:0 0 6px}
  .box p{font-size:13px;color:var(--muted);margin:0 0 14px;line-height:1.5}
  .box input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;outline:0}
  .box input:focus{border-color:var(--accent)}
  .box .err{color:#e74c3c;font-size:13px;min-height:18px;margin:8px 0}
  .box button{width:100%;padding:10px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-size:15px;cursor:pointer}
  .box button:active{opacity:.9}
  .home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
  .home h1{font-size:20px;margin:0 0 10px}
  .home p{color:var(--muted);font-size:14px;line-height:1.8;margin:0}
  .home code{background:#eee;padding:2px 6px;border-radius:4px;font-size:13px}
  .hidden{display:none!important}
  .upload-status{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--upload-bg);color:var(--bg);padding:8px 16px;border-radius:20px;font-size:13px;z-index:20;opacity:0;transition:opacity .3s;pointer-events:none}
  .upload-status.show{opacity:1}
  #loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:5;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<header>
  <span class="dot" id="status"></span>
  <span id="statustext">连接中…</span>
  <span class="sp"></span>
  <button id="themeBtn" title="切换夜间模式">🌙</button>
  <button id="uploadBtn" title="上传图片">📤</button>
  <button id="copyBtn" title="复制到剪贴板">⧉</button>
  <button id="exportImgBtn" title="导出为图片并复制">📥</button>
  <button id="lock">退出</button>
</header>
<div id="editor" data-ph="开始输入，自动同步到所有设备…" contenteditable="true"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">
<footer id="foot">端到端加密 · 仅在你的浏览器内加解密</footer>
<div class="upload-status" id="uploadStatus"></div>

<div id="loading">加载中…</div>

<div class="home hidden" id="home">
  <h1>NoteSync</h1>
  <p>请在 URL 后加笔记名访问，例如：<br><code>note.xuyinji.com.cn/biji</code></p>
</div>

<div class="mask hidden" id="mask">
  <div class="box">
    <h1>输入访问口令</h1>
    <p>此口令用于在本机派生加密密钥，不会发送到服务器。每台新设备首次打开需输入一次，之后自动记住。</p>
    <input id="pw" type="password" autocomplete="off" autofocus>
    <div class="err" id="err"></div>
    <button id="ok">解锁</button>
  </div>
</div>

<script>
'use strict';

// --- Cloudinary 配置（非密钥，安全） ---
const CLOUD_NAME = 'dntsgx6t3';
const UPLOAD_PRESET = 'NoteXCloudinary';
const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload';
const MAX_IMG_WIDTH = 1920;

const noteId = location.pathname.split('?')[0].replace(/^\/+|\/+$/g, '');
const NOTE_API = '/api/note/' + encodeURIComponent(noteId);
const FAIL_API = '/api/fail/' + encodeURIComponent(noteId);
const KEY_STORE = 'notesync_key_' + noteId;
const PBKDF2_ITER = 200000;
const FAIL_LIMIT = 10;

const $ = s => document.querySelector(s);
const editor = $('#editor'), mask = $('#mask'), pw = $('#pw'), err = $('#err');
const statusEl = $('#status'), statusText = $('#statustext'), foot = $('#foot');
const homeEl = $('#home'), loadingEl = $('#loading');
const uploadBtn = $('#uploadBtn'), fileInput = $('#fileInput'), uploadStatus = $('#uploadStatus');
const themeBtn = $('#themeBtn');
const copyBtn = $('#copyBtn'), exportImgBtn = $('#exportImgBtn');

// --- 夜间模式 ---
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('notesync_theme', dark ? 'dark' : 'light');
}
(function initTheme() {
  const saved = localStorage.getItem('notesync_theme');
  if (saved) { applyTheme(saved === 'dark'); }
  else { applyTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches); }
})();
themeBtn.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));

const bufToB64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b64ToBuf = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

let cryptoKey = null, serverSalt = null, localVer = 0, busy = false, lastHtml = '';

function setStatus(on, text) { statusEl.className = 'dot' + (on ? ' on' : ''); statusText.textContent = text; }
function fmtRetry(sec) { const m = Math.ceil(sec / 60); return m + ' 分钟'; }
function showUploadStatus(text) { uploadStatus.textContent = text; uploadStatus.classList.add('show'); }
function hideUploadStatus() { uploadStatus.classList.remove('show'); }

// --- 加解密 ---
async function deriveKey(pass, saltBuf) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBuf, iterations: PBKDF2_ITER, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
  );
}
async function encryptText(text, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(text));
  return { ct: bufToB64(ct), iv: bufToB64(iv) };
}
async function decryptText(ctB64, ivB64, key) {
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBuf(ivB64) }, key, b64ToBuf(ctB64));
  return new TextDecoder().decode(pt);
}

// --- API（含自动重试） ---
async function fetchRetry(url, opts, retries) {
  for (let i = 0; i <= retries; i++) {
    try {
      const r = await fetch(url, opts);
      if (r.status === 429) { const j = await r.json(); throw { locked: true, retryAfter: j.retryAfter || 1800 }; }
      if (!r.ok) throw new Error((opts?.method||'GET') + ' ' + r.status);
      return r;
    } catch (e) {
      if (e.locked) throw e;
      if (i < retries) { await new Promise(r => setTimeout(r, [1000, 3000, 5000][i] || 5000)); continue; }
      throw e;
    }
  }
}
async function apiGet() {
  const r = await fetchRetry(NOTE_API, { cache: 'no-store' }, 2);
  return r.json();
}
async function apiPut(obj) {
  const r = await fetchRetry(NOTE_API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(obj) }, 2);
  return r.json();
}
async function reportFail() {
  try {
    const r = await fetch(FAIL_API, { method: 'POST' });
    const j = await r.json();
    if (r.status === 429 || j.locked) { err.textContent = '尝试过多，请 ' + fmtRetry(j.retryAfter || 1800) + ' 后再试'; return; }
    const left = FAIL_LIMIT - (j.count || 0);
    if (left > 0 && left <= 3) err.textContent = '口令错误，解密失败（剩余 ' + left + ' 次尝试）';
    else err.textContent = '口令错误，解密失败';
  } catch (e) { err.textContent = '口令错误，解密失败'; }
}

// --- 图片上传 ---
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > MAX_IMG_WIDTH) { h = Math.round(h * MAX_IMG_WIDTH / w); w = MAX_IMG_WIDTH; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => { if (!blob) { reject(new Error('compress failed')); return; } resolve(blob); }, 'image/jpeg', 0.85);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadToCloudinary(blob) {
  const formData = new FormData();
  formData.append('file', blob);
  formData.append('upload_preset', UPLOAD_PRESET);
  const r = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
  if (!r.ok) throw new Error('Upload failed: ' + r.status);
  const j = await r.json();
  return j.secure_url;
}

// 在光标处插入图片
function insertImageAtCursor(url) {
  editor.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount) { editor.innerHTML += '<img src="' + url + '"><br>'; return; }
  const range = sel.getRangeAt(0);
  range.deleteContents();
  const img = document.createElement('img');
  img.src = url;
  range.insertNode(img);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
  editor.dispatchEvent(new Event('input'));
}

async function handleImageUpload(file) {
  if (!file || !file.type.startsWith('image/')) return;
  showUploadStatus('📷 正在压缩图片…');
  try {
    const blob = await compressImage(file);
    showUploadStatus('☁️ 正在上传…');
    const url = await uploadToCloudinary(blob);
    insertImageAtCursor(url);
    showUploadStatus('✅ 上传成功');
  } catch (e) {
    showUploadStatus('❌ 上传失败：' + e.message);
  }
  setTimeout(hideUploadStatus, 2000);
}

// 粘贴：图片→上传，文字→纯文本
editor.addEventListener('paste', e => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      handleImageUpload(item.getAsFile());
      return;
    }
  }
  // 文字：识别 URL 转链接，其余纯文本
  if (e.clipboardData.getData('text/plain')) {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    const urlRegex = /(https?:\/\/[^\s<]+)/g;
    if (urlRegex.test(text)) {
      // 含 URL：转为 HTML 插入
      const html = text.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
      document.execCommand('insertHTML', false, html);
    } else {
      // 纯文本
      document.execCommand('insertText', false, text);
    }
  }
});

// 拖拽图片
editor.addEventListener('dragover', e => { e.preventDefault(); editor.classList.add('dragover'); });
editor.addEventListener('dragleave', () => editor.classList.remove('dragover'));
editor.addEventListener('drop', e => {
  e.preventDefault();
  editor.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files && files.length > 0) handleImageUpload(files[0]);
});

// 点击链接在新标签页打开（mousedown 阶段拦截，防止光标落入编辑）
editor.addEventListener('mousedown', e => {
  const a = e.target.closest('a');
  if (a) {
    e.preventDefault();
    window.open(a.href, '_blank', 'noopener,noreferrer');
  }
});

// 文件选择上传
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files && e.target.files[0]) handleImageUpload(e.target.files[0]);
  e.target.value = '';
});

// --- 复制到剪贴板 ---
copyBtn.addEventListener('click', async () => {
  try {
    const html = editor.innerHTML;
    const text = editor.innerText;
    const item = new ClipboardItem({
      'text/html': new Blob([html], { type: 'text/html' }),
      'text/plain': new Blob([text], { type: 'text/plain' })
    });
    await navigator.clipboard.write([item]);
    showUploadStatus('✅ 已复制到剪贴板');
  } catch (e) {
    try {
      await navigator.clipboard.writeText(editor.innerText);
      showUploadStatus('✅ 已复制文字');
    } catch (e2) {
      showUploadStatus('❌ 复制失败');
    }
  }
  setTimeout(hideUploadStatus, 2000);
});

// --- 导出为图片并复制 ---
exportImgBtn.addEventListener('click', async () => {
  if (typeof html2canvas === 'undefined') {
    showUploadStatus('❌ 图片导出组件未加载');
    setTimeout(hideUploadStatus, 2000);
    return;
  }
  showUploadStatus('📥 正在生成图片…');
  try {
    const originalOverflow = editor.style.overflow;
    editor.style.overflow = 'visible';
    const canvas = await html2canvas(editor, {
      backgroundColor: getComputedStyle(document.body).backgroundColor,
      scale: 2,
      useCORS: true,
      logging: false,
      width: editor.scrollWidth,
      height: editor.scrollHeight,
      windowWidth: editor.scrollWidth,
      windowHeight: editor.scrollHeight
    });
    editor.style.overflow = originalOverflow;
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    showUploadStatus('✅ 图片已复制，可直接 Ctrl+V 粘贴');
  } catch (e) {
    showUploadStatus('❌ 导出失败：' + e.message);
  }
  setTimeout(hideUploadStatus, 3000);
});

// --- 解锁 ---
async function unlock(pass) {
  err.textContent = '';
  if (!pass) { err.textContent = '请输入口令'; return; }
  let note;
  try { note = await apiGet(); }
  catch (e) {
    if (e.locked) { err.textContent = '尝试过多，请 ' + fmtRetry(e.retryAfter) + ' 后再试'; return; }
    err.textContent = '无法连接服务器'; return;
  }
  serverSalt = note.salt ? b64ToBuf(note.salt) : crypto.getRandomValues(new Uint8Array(16));
  let key;
  try { key = await deriveKey(pass, serverSalt); } catch (e) { err.textContent = '派生密钥失败'; return; }
  if (note.ct) {
    try { await decryptText(note.ct, note.iv, key); }
    catch (e) { await reportFail(); return; }
  }
  cryptoKey = key;
  try {
    const raw = await crypto.subtle.exportKey('raw', key);
    localStorage.setItem(KEY_STORE, bufToB64(raw));
  } catch (e) {}
  if (!note.salt) { try { await apiPut({ ct: '', iv: '', salt: bufToB64(serverSalt) }); } catch (e) {} }
  localVer = note.v || 0;
  mask.classList.add('hidden');
  editor.focus();
  if (note.ct) { try { lastHtml = await decryptText(note.ct, note.iv, key); editor.innerHTML = lastHtml; linkifyEditor(); } catch (e) {} }
  foot.textContent = '已解锁 · 端到端加密';
  startSync();
}

async function loadStoredKey() {
  const b64 = localStorage.getItem(KEY_STORE);
  if (!b64) return false;
  try {
    const key = await crypto.subtle.importKey('raw', b64ToBuf(b64), { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
    cryptoKey = key; return true;
  } catch (e) { localStorage.removeItem(KEY_STORE); return false; }
}

// --- 同步 ---
let saveTimer = null, linkifyTimer = null, isLinkifying = false;

// URL 自动检测：扫描文本节点，将纯文本 URL 转为 <a> 标签
function linkifyEditor() {
  if (isLinkifying) return;
  isLinkifying = true;
  try {
    const urlTest = /https?:\/\/[^\s<]+/;
    const urlRegex = /(https?:\/\/[^\s<]+)/g;
    const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, {
      acceptNode: node => {
        let p = node.parentNode;
        while (p && p !== editor) {
          if (p.tagName === 'A') return NodeFilter.FILTER_REJECT;
          p = p.parentNode;
        }
        return urlTest.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    const targets = [];
    let n;
    while (n = walker.nextNode()) targets.push(n);
    if (targets.length === 0) return;
    // 保存光标位置
    const sel = window.getSelection();
    let savedRange = null;
    if (sel.rangeCount > 0) {
      savedRange = sel.getRangeAt(0).cloneRange();
    }
    for (const textNode of targets) {
      const text = textNode.nodeValue;
      const span = document.createElement('span');
      span.innerHTML = text.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
      textNode.replaceWith(...span.childNodes);
    }
    // 恢复光标
    if (savedRange && document.activeElement === editor) {
      try { sel.removeAllRanges(); sel.addRange(savedRange); } catch(e) {}
    }
  } finally { isLinkifying = false; }
}

editor.addEventListener('input', () => {
  if (busy) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveLocal, 800);
  // 延迟 linkify，避免打断输入
  clearTimeout(linkifyTimer);
  linkifyTimer = setTimeout(linkifyEditor, 500);
});

async function saveLocal() {
  const html = editor.innerHTML;
  if (html === lastHtml) return;
  busy = true; setStatus(false, '保存中…');
  try {
    const { ct, iv } = await encryptText(html, cryptoKey);
    const r = await apiPut({ ct, iv, salt: bufToB64(serverSalt) });
    localVer = r.v; lastHtml = html;
    setStatus(true, '已同步');
  } catch (e) {
    if (e.locked) { setStatus(false, '已锁定，请稍后'); editor.contentEditable = false; }
    else { setStatus(false, '保存失败'); }
  }
  finally { busy = false; }
}

async function poll() {
  if (busy) return;
  try {
    const note = await apiGet();
    setStatus(true, '已同步');
    if ((note.v || 0) > localVer && note.ct) {
      const html = await decryptText(note.ct, note.iv, cryptoKey);
      if (html !== editor.innerHTML) {
        // 保存光标位置，覆盖后恢复
        const wasFocused = document.activeElement === editor;
        let savedOffset = null;
        if (wasFocused) {
          const sel = window.getSelection();
          if (sel.rangeCount > 0) savedOffset = sel.getRangeAt(0).startOffset;
        }
        lastHtml = html;
        editor.innerHTML = html;
        linkifyEditor();
        if (wasFocused) {
          editor.focus();
          const sel = window.getSelection();
          if (savedOffset !== null && sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            try { range.setStart(editor.firstChild || editor, Math.min(savedOffset, (editor.firstChild?.textContent||'').length)); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); } catch(e) {}
          }
        }
      }
      localVer = note.v;
    }
  } catch (e) {
    if (e.locked) setStatus(false, '已锁定');
    else setStatus(false, '同步中断');
  }
}

// SSE 推送 + 断线自动重连 + 轮询兜底
let sseSource = null, pollTimer = null, sseReconnectTimer = null;

function connectSSE() {
  try {
    sseSource = new EventSource('/api/note/' + encodeURIComponent(noteId) + '/stream');
    sseSource.onopen = () => {
      // SSE 连接恢复，清除轮询兜底
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    };
    sseSource.onmessage = e => { poll(); };
    sseSource.onerror = () => {
      if (sseSource) { sseSource.close(); sseSource = null; }
      // 断线兜底：10 秒轮询
      if (!pollTimer) { pollTimer = setInterval(poll, 10000); }
      // 5 秒后自动重连 SSE
      if (!sseReconnectTimer) {
        sseReconnectTimer = setTimeout(() => {
          sseReconnectTimer = null;
          connectSSE();
        }, 5000);
      }
    };
  } catch (e) {
    if (!pollTimer) { pollTimer = setInterval(poll, 10000); }
  }
}

function startSync() {
  connectSSE();
  poll();
}

$('#ok').addEventListener('click', () => unlock(pw.value));
pw.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(pw.value); });
$('#lock').addEventListener('click', () => {
  localStorage.removeItem(KEY_STORE); cryptoKey = null;
  editor.innerHTML = ''; editor.contentEditable = false;
  mask.classList.remove('hidden'); pw.value = ''; err.textContent = '';
  foot.textContent = '端到端加密 · 仅在你的浏览器内加解密';
  setStatus(false, '已退出');
});

(async function init() {
  if (!noteId) {
    loadingEl.classList.add('hidden');
    editor.style.display = 'none';
    homeEl.classList.remove('hidden');
    setStatus(true, 'NoteSync');
    return;
  }
  if (await loadStoredKey()) {
    let note;
    try { note = await apiGet(); }
    catch (e) {
      loadingEl.classList.add('hidden');
      if (e.locked) {
        setStatus(false, '已锁定');
        mask.classList.remove('hidden');
        err.textContent = '尝试过多，请 ' + fmtRetry(e.retryAfter) + ' 后再试';
        return;
      }
      setStatus(false, '无法连接');
      mask.classList.remove('hidden');
      pw.focus();
      return;
    }
    serverSalt = note.salt ? b64ToBuf(note.salt) : null;
    if (!serverSalt) {
      loadingEl.classList.add('hidden');
      mask.classList.remove('hidden');
      pw.focus();
      return;
    }
    localVer = note.v || 0;
    loadingEl.classList.add('hidden');
    editor.focus();
    if (note.ct) { try { lastHtml = await decryptText(note.ct, note.iv, cryptoKey); editor.innerHTML = lastHtml; linkifyEditor(); } catch (e) {} }
    foot.textContent = '已解锁 · 端到端加密';
    startSync();
  } else {
    loadingEl.classList.add('hidden');
    mask.classList.remove('hidden');
    pw.focus();
  }
})();
// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
